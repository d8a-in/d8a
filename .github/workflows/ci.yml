name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet · gofmt · test -race · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # gofmt -l lists files that need formatting. We fail if any
        # are listed so unformatted code can't sneak into main.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::the following files are not gofmt-clean:" >&2
            echo "$out" >&2
            echo "" >&2
            gofmt -d . >&2
            exit 1
          fi

      - name: go test -race
        run: go test -race ./...

      - name: build binaries
        run: |
          go build -o /tmp/d8a-server ./cmd/server
          go build -o /tmp/d8a-client ./cmd/client
          /tmp/d8a-server --version
          /tmp/d8a-client --version
