name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Opt in early to Node 24 for JavaScript-based actions. GitHub is
# forcing this default on 2026-06-16 anyway; setting it now silences
# the deprecation warning on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: vet · gofmt · test -race · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # No third-party dependencies yet, so there's nothing to
          # cache. Re-enable when we add a go.sum.
          cache: false

      - name: install bubblewrap and enable unprivileged user namespaces
        # The sandbox tests exec bwrap to verify real containment;
        # ubuntu-latest runners don't have it pre-installed.
        #
        # Ubuntu 24.04 restricts unprivileged user namespaces by default
        # (kernel.apparmor_restrict_unprivileged_userns=1), which makes
        # bwrap fail to set up its sandbox. Relax that just for the
        # runner so the integration tests can exercise real namespace
        # isolation. Real deployments should leave the restriction in
        # place and run bwrap setuid if needed.
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # gofmt -l lists files that need formatting. We fail if any
        # are listed so unformatted code can't sneak into main.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::the following files are not gofmt-clean:" >&2
            echo "$out" >&2
            echo "" >&2
            gofmt -d . >&2
            exit 1
          fi

      - name: go test -race
        run: go test -race ./...

      - name: build binaries
        run: |
          go build -o /tmp/d8a-server ./cmd/server
          go build -o /tmp/d8a-client ./cmd/client
          /tmp/d8a-server --version
          /tmp/d8a-client --version
